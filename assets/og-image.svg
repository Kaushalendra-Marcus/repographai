  <text x="172" y="244" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13.5" fill="#475569" letter-spacing="0.1">VS Code Extension  ·  Free &amp; Open Source  ·  MIT License</text>

