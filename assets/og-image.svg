  <!-- Sub — muted gray #94a3b8 -->
  <text x="80" y="472" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="19" fill="#94a3b8">Visual dependency graphs · AI summaries · Live codebase Q&amp;A</text>

