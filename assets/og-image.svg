  <rect x="222" y="504" width="128" height="34" rx="17" fill="none" stroke="#1e3a6e" stroke-width="1"/>
  <text x="286" y="526" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12.5" fill="#60a5fa" text-anchor="middle" font-weight="600">5 AI Providers</text>

