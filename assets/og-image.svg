    <line x1="830" y1="155" x2="940" y2="105" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="830" y1="155" x2="985" y2="225" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="830" y1="155" x2="745" y2="275" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="940" y1="105" x2="1050" y2="148" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="985" y1="225" x2="1050" y2="148" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="745" y1="275" x2="825" y2="370" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="985" y1="225" x2="915" y2="338" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="745" y1="275" x2="662" y2="198" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="825" y1="370" x2="915" y2="338" stroke="#3b82f6" stroke-width="1.5"/>
