    <line x1="1050" y1="148" x2="1108" y2="240" stroke="#3b82f6" stroke-width="1.5"/>
    <line x1="1108" y1="240" x2="1015" y2="398" stroke="#3b82f6" stroke-width="1.5"/>
  </g>

