    <circle cx="915" cy="338" r="8"  fill="#3b82f6" opacity="0.7"/>
    <circle cx="782" cy="462" r="6"  fill="#60a5fa" opacity="0.5"/>
    <circle cx="1015" cy="398" r="7" fill="#3b82f6" opacity="0.6"/>
    <circle cx="1108" cy="240" r="8" fill="#3b82f6" opacity="0.65"/>
  </g>

